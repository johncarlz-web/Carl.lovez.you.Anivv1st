<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Our Story 💖</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to bottom right, #ffd6e8, #ffeef5);
  text-align: center;
  color: #444;
}

/* PAGES */
.page {
  display: none;
  padding: 30px;
  animation: fade 0.6s;
}
.active {
  display: block;
}

@keyframes fade {
  from {opacity: 0;}
  to {opacity: 1;}
}

/* MAIN BUTTONS */
.main-btn {
  display: block;
  width: 80%;
  margin: 15px auto;
  padding: 20px;
  font-size: 18px;
  border: none;
  border-radius: 20px;
  background: #ff7aa2;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.main-btn:hover {
  background: #ff4f87;
  transform: scale(1.03);
}

/* SMALL BUTTON */
.small-btn {
  padding: 10px 18px;
  border-radius: 20px;
  border: none;
  background: #ff7aa2;
  color: white;
  cursor: pointer;
  margin-top: 20px;
}

/* ENVELOPE */
.envelope {
  background: white;
  padding: 20px;
  border-radius: 20px;
  width: 85%;
  max-width: 400px;
  margin: 20px auto;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  display: none;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin: 20px;
}

.memory-btn {
  padding: 20px;
  border: none;
  border-radius: 15px;
  background: #ff9ab5;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.memory-btn:hover {
  transform: scale(1.05);
}

/* HEARTS */
.heart {
  position: fixed;
  bottom: -10px;
  color: #ff7aa2;
  animation: floatUp 4s linear;
}

@keyframes floatUp {
  to {
    transform: translateY(-100vh);
    opacity: 0;
  }
}

/* STAR BACKGROUND */
.star-bg {
  background: black;
  color: white;
  overflow: hidden;
}

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
  from {opacity: 0.3;}
  to {opacity: 1;}
}
</style>
</head>

<body>

<!-- MAIN PAGE -->
<div id="home" class="page active">
  <h1>Our Story 💖</h1>

  <button class="main-btn" onclick="showPage('anniv')">
    1ST ANNIVERSARY OF PURE LOVE
  </button>

  <button class="main-btn" onclick="showPage('memories')">
    MY FAVORITE MEMORIES WITH YOU
  </button>

  <button class="main-btn">Coming Soon</button>
  <button class="main-btn">Coming Soon</button>
</div>

<!-- ANNIVERSARY PAGE -->
<div id="anniv" class="page">
  <h2>Hey... 💌</h2>

  <button class="small-btn" onclick="revealMessage()">
    CUTIE PLSS CLICK LOVEUU
  </button>

  <div class="envelope" id="letter">
    <h3>💌</h3>
    <p>
      Write your anniversary message here 💖
    </p>

    <button class="small-btn" onclick="showPage('final')">
      one more thing… 💖
    </button>
  </div>
</div>

<!-- FINAL PAGE -->
<div id="final" class="page">
  <div class="envelope" style="display:block;">
    <h3>💖</h3>
    <p>
      Your final message here 💖
    </p>
  </div>
</div>

<!-- MEMORIES GRID -->
<div id="memories" class="page">
  <h2>My Favorite Memories With You 💖</h2>

  <div class="grid">
    <button class="memory-btn" onclick="showPage('memory1')">
      The Night we confessed
    </button>

    <button class="memory-btn">Coming Soon</button>
    <button class="memory-btn">Coming Soon</button>
    <button class="memory-btn">Coming Soon</button>
    <button class="memory-btn">Coming Soon</button>
    <button class="memory-btn">Coming Soon</button>
    <button class="memory-btn">Coming Soon</button>
    <button class="memory-btn">Coming Soon</button>
    <button class="memory-btn">Final Memory 💖</button>
  </div>

  <button class="small-btn" onclick="showPage('home')">Back</button>
</div>

<!-- MEMORY 1 PAGE -->
<div id="memory1" class="page star-bg">

  <div class="envelope" style="display:block;">
    <h3>🌙 The Night we confessed</h3>

    <p>
      Write your memory here 💖
    </p>
  </div>

  <button class="small-btn" onclick="showPage('memories')">
    Back to memories
  </button>
</div>

<script>
function showPage(pageId) {
  let pages = document.querySelectorAll('.page');
  pages.forEach(p => p.classList.remove('active'));

  document.getElementById(pageId).classList.add('active');

  if (pageId === "memory1") {
    createStars();
  }
}

/* ANNIVERSARY EFFECT */
function revealMessage() {
  setTimeout(() => {
    document.getElementById("letter").style.display = "block";
    createHearts();
  }, 700);
}

/* HEART BURST */
function createHearts() {
  for (let i = 0; i < 15; i++) {
    let heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerText = "💖";
    heart.style.left = Math.random() * 100 + "vw";

    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 4000);
  }
}

/* STAR GENERATOR */
function createStars() {
  for (let i = 0; i < 50; i++) {
    let star = document.createElement("div");
    star.classList.add("star");
    star.style.top = Math.random() * 100 + "vh";
    star.style.left = Math.random() * 100 + "vw";

    document.body.appendChild(star);
  }
}
</script>

</body>
</html>
